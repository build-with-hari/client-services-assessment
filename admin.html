<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc; --text-main: #0f172a; --text-muted: #64748b; 
            --card-bg: #ffffff; --border: #e2e8f0; --primary: #2563eb;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 20px; }
        
        /* Lock Screen */
        #lock-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; }
        .lock-box { background: var(--card-bg); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border); text-align: center; }
        input[type="password"] { padding: 12px; border: 2px solid var(--border); border-radius: 8px; font-size: 16px; letter-spacing: 4px; text-align: center; width: 200px; margin-bottom: 20px; }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Dashboard */
        #dashboard { display: none; max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #f1f5f9; font-weight: 600; color: var(--text-muted); font-size: 14px; text-transform: uppercase; }
        td { font-size: 15px; }
        .btn-view { display: inline-block; background: #f1f5f9; color: var(--primary); padding: 6px 12px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 13px; }
        .btn-view:hover { background: #e2e8f0; }
        .status-flag { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .flag-clean { background: #dcfce7; color: #166534; }
        .flag-warn { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <!-- LOCK SCREEN -->
    <div id="lock-screen">
        <div class="lock-box">
            <h2>🛡️ Admin Access</h2>
            <p style="color: var(--text-muted); margin-bottom: 20px;">Enter your PIN to securely fetch data.</p>
            <input type="password" id="pin-input" placeholder="****" maxlength="4">
            <br>
            <button onclick="authenticate()">Unlock Dashboard</button>
            <div id="auth-error" style="color: red; margin-top: 15px; font-weight: bold; display: none;">Invalid PIN.</div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
        <div class="header">
            <h2>Assessment Candidates</h2>
            <button onclick="fetchData()" style="background: #10b981;">🔄 Refresh Data</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Candidate Name</th>
                    <th>Email</th>
                    <th>Phase 1 Score</th>
                    <th>Phase 2 (Essay)</th>
                    <th>Integrity</th>
                    <th>Drive Link</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="7" style="text-align: center; padding: 40px;">Fetching records...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwyqEg3vr_nm-6MpnNuBu2Aa7EVkC2-UBrG-wAckFEDojFrg63U0M3u4qG02mngy3OB/exec"; // Same Script URL

        async function authenticate() {
            const pin = document.getElementById('pin-input').value;
            if (!pin) return;
            document.querySelector('.lock-box button').innerText = "Authenticating...";
            
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getAdminData', pin: pin }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    renderTable(result.data);
                } else {
                    document.getElementById('auth-error').style.display = 'block';
                    document.querySelector('.lock-box button').innerText = "Unlock Dashboard";
                }
            } catch (err) {
                alert("Network error.");
                document.querySelector('.lock-box button').innerText = "Unlock Dashboard";
            }
        }

        async function fetchData() {
            document.getElementById('table-body').innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px;">Refreshing records...</td></tr>';
            authenticate(); 
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            // Skip the header row (index 0) and map data
            for (let i = data.length - 1; i > 0; i--) { // Reverse chronological
                const row = data[i];
                if (!row[1]) continue; // Skip empty rows

                const dateStr = new Date(row[0]).toLocaleDateString();
                const name = row[1];
                const email = row[2];
                // Extract just the number from "Score: X out of 100" if possible
                const p1ScoreRaw = row[3] || "N/A";
                const p1Score = p1ScoreRaw.includes("Score:") ? p1ScoreRaw.split("\n")[0] : "N/A";
                const p2ScoreRaw = row[9] || "N/A";
                const p2Score = p2ScoreRaw.includes("Score:") ? p2ScoreRaw.split("\n")[0] : "N/A";
                
                const exits = parseInt(row[4]) || 0;
                const flagClass = exits > 0 ? "flag-warn" : "flag-clean";
                const flagText = exits > 0 ? `${exits} Violations` : "Clean";
                const folderUrl = row[5];

                tbody.innerHTML += `
                    <tr>
                        <td style="color: var(--text-muted);">${dateStr}</td>
                        <td style="font-weight: 600;">${name}</td>
                        <td>${email}</td>
                        <td style="font-weight: 600; color: #2563eb;">${p1Score}</td>
                        <td style="font-weight: 600; color: #8b5cf6;">${p2Score}</td>
                        <td><span class="status-flag ${flagClass}">${flagText}</span></td>
                        <td><a href="${folderUrl}" target="_blank" class="btn-view">View Folder ↗</a></td>
                    </tr>
                `;
            }
        }
    </script>
</body>
</html>
